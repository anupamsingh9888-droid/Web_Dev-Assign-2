<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Async Weather Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-image: url(https://i.pinimg.com/1200x/bd/90/11/bd9011ab2a9284e1b0ff1ce07f4275c2.jpg);
      padding: 20px;
    }

    .container {
      max-width: 1300px;
      margin: auto;
    }

    .parent-card {
      display: grid;
      gap: 20px;
    }

    h1 {
      text-align: center;
      color: #BBE0EF;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      width: 100%;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 2px solid #BBE0EF;
    }

    button {
      padding: 10px 20px;
      background: #6459ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

  /* STYLE WEATHER INFO CARD */
#weather {
  padding: 10px 0;
}

.weather-card {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  font-size: 1em;
}

/* Modern weather field line */
.weather-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  border-radius: 8px;
  background: #f0f8ff;
  border-left: 4px solid #F16D34;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
  transition: backgroud 0.2s ease;
}

.weather-item:hover {
  background: #e6f2ff;
}

.weather-item label {
  font-weight: 600;
  color: #222;
}

.weather-item span {
  font-weight: 500;
  color: #333;
  font-size: 0.98em;
}

/* Extra small spacing for compact view */
.weather.card h3 {
  margin-bottom: 10px;
  color: #222;
  font-size: 1.1em;
}

    .console {
      background: #161E54;
      color: #BBE0EF;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      max-height: 250px;
      overflow-y: auto;
    }

    .log.async {
      border-left: 3px solid #F16D34;
      padding-left: 6px;
    }

    .log.promise {
      border-left: 3px solid #FF986A;
      padding-left: 6px;
    }

    .log.callback {
      border-left: 3px solid #BBE0EF;
      padding-left: 6px;
    }

    .history button {
      margin: 5px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #4c7889;
      background: #4c7889;
    }

    .history button:hover {
      background: #e0e0e0;
    }

    @media (max-width: 700px) {
      .parent-card {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🌤 Async Weather Tracker</h1>

    <div class="parent-card">
      <div class="card">
        <h3>Search City</h3>
        <div class="input-group">
          <input id="cityInput" placeholder="Delhi, London" />
          <button id="searchBtn">Search</button>
        </div>

        <br />
        <br />
        <h3>Search History</h3>
        <div class="history" id="history"></div>
        <div>
          <button id="clearHistory" style="margin-top: 10px; background: #cc4444;">
            Clear History
          </button>
        </div>
      </div>

      <div class="card">
        <h3>Weather Info</h3>
        <div id="weather"></div>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = "f0182c41094e9f0e198df5651eea6d84";
    const weatherBox = document.getElementById("weather");
    const historyBox = document.getElementById("history");
    const cityInput = document.getElementById("cityInput");

    const HISTORY_KEY = "weatherHistory";
    const MAX_HISTORY = 10;

    /* ---------- WEATHER FETCH ---------- */
    async function getWeather(city) {
      const res = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
      );
      if (!res.ok) {
        alert("City not found");
        throw new Error("City not found");
      }
      const data = await res.json();
      return data;
    }

    /* ---------- UI RENDER ---------- */
    function renderWeather(d) {
      weatherBox.innerHTML = `
        <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
        <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
        <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
        <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
        <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
      `;
    }

    /* ---------- SAVE SEARCH HISTORY ---------- */
    function saveHistory(city) {
      const existing = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
      let history = existing.filter(c => c.toLowerCase() !== city.toLowerCase());
      history.unshift(city); // put newest at front
      if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      showHistory();
    }

    /* ---------- SHOW HISTORY ---------- */
    function showHistory() {
      const history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
      historyBox.innerHTML = "";
      history.forEach(city => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.innerText = city;
        btn.onclick = () => search(city);
        historyBox.appendChild(btn);
      });
    }

    /* ---------- SEARCH FUNCTION ---------- */
    async function search(city) {
      cityInput.value = city; // autofill input
      weatherBox.innerHTML = "<p>Loading...</p>";
      try {
        const data = await getWeather(city);
        renderWeather(data);
        saveHistory(data.name);
      } catch (error) {
        weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
      }
    }

    /* ---------- BUTTON CLICK ---------- */
    document.getElementById("searchBtn").onclick = () => {
      const city = cityInput.value.trim();
      if (city) {
        search(city);
      }
    };

    /* ---------- ENTER KEY SEARCH ---------- */
    cityInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const city = cityInput.value.trim();
        if (city) {
          search(city);
        }
      }
    });

    /* ---------- CLEAR HISTORY ---------- */
    document.getElementById("clearHistory").onclick = () => {
      localStorage.removeItem(HISTORY_KEY);
      showHistory();
    };

    /* ---------- INITIAL LOAD ---------- */
    showHistory();
  </script>
</body>

</html>
